apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: prekshanshaiva001/backend-app:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000

